worker_processes 1;

events {
    worker_connections 1024;
}

http {

    # Upstreams (nombres = servicios de docker-compose)
    upstream web_app {
        server web_app:5001;
    }

    upstream api_ingestor {
        server api_ingestor:5000;
    }

    upstream frontend_oogsj {
        server frontend_oogsj:80;
    }

    server {
        listen 80;
        server_name localhost;

        # ---------- FRONTEND SVELTE ----------
        location / {
            proxy_pass http://frontend_oogsj;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- DASHBOARD (Flask) ----------
        # IMPORTANTE: sin "/" al final para no reescribir la URI.
        location /dashboard {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- STATIC DE FLASK ----------
        # IMPORTANTE: no apuntar a /static/ en el proxy_pass para no duplicar rutas.
        location /static/ {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- API FLASK ----------
        # Mantener ruta absoluta en el frontend: fetch("/api/..."), NO "api/...".
        location /api/ {
            proxy_pass http://web_app;
            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- INGESTOR ----------
        location /update/ {
            proxy_pass http://api_ingestor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /status {
            proxy_pass http://api_ingestor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- SPA fallback ----------
        error_page 404 /index.html;

        location = /index.html {
            proxy_pass http://frontend_oogsj;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
