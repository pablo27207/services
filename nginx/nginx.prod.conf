worker_processes 1;

events {
    worker_connections 1024;
}

http {

    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream web_app {
        server web_app:5001;
    }
    upstream api_ingestor {
        server api_ingestor:5000;
    }
    upstream frontend_oogsj {
        server frontend_oogsj:80;
    }

    server {
        listen 80;
        server_name oogsj.com www.oogsj.com oogsj.com.ar www.oogsj.com.ar oogsj.gob.ar www.oogsj.gob.ar;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://oogsj.gob.ar$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name oogsj.com www.oogsj.com oogsj.com.ar www.oogsj.com.ar;
        ssl_certificate /etc/letsencrypt/live/oogsj.gob.ar/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oogsj.gob.ar/privkey.pem;
        return 301 https://oogsj.gob.ar$request_uri;
    }

    server {
        listen 443 ssl;
        server_name oogsj.gob.ar www.oogsj.gob.ar;
        ssl_certificate /etc/letsencrypt/live/oogsj.gob.ar/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oogsj.gob.ar/privkey.pem;

        location = /nodogeonetwork {
            return 302 https://oogsj.gob.ar/datahub/;
        }
        location = /nodogeonetwork/ {
            return 302 https://oogsj.gob.ar/datahub/;
        }
        location ^~ /datahub/ {
            proxy_pass         http://gn_nginx:80/datahub/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
        location ^~ /geonetwork {
            proxy_pass         http://gn_nginx:80/geonetwork;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            client_max_body_size 200M;
        }
        location / {
            proxy_pass http://frontend_oogsj;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /dashboard {
            proxy_pass http://web_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /static/ {
            proxy_pass http://web_app/static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/ {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect http:// https://;
        }
        location /update/ {
            proxy_pass http://api_ingestor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /status {
            proxy_pass http://api_ingestor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        error_page 404 /index.html;
        location = /index.html {
            proxy_pass http://frontend_oogsj;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
